version: 2
updates:
  # This template only ships GitHub Actions workflows. Once you add
  # a language manifest (package.json, requirements.txt, go.mod,
  # Dockerfile, etc.), uncomment the matching block below.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

